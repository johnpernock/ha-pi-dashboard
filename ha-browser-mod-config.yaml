# =============================================================================
#  NOTES ON browser_mod LIGHT ENTITY vs DISPLAY API
# =============================================================================
#
#  browser_mod light entity (light.browser_mod_KIOSK_BROWSER_ID):
#    - A CSS black overlay drawn OVER the page content in the browser
#    - Works on any Chromium browser (does NOT require Fully Kiosk Browser)
#    - turn_off = full black overlay (screen appears off, Pi still running)
#    - brightness_pct controls overlay transparency (100% = no overlay, 0% = full black)
#    - Useful for: screensaver effect, "screen off" appearance, partial dimming
#    - Does NOT reduce hardware backlight — the panel still consumes full power
#
#  Display API (rest_command.kiosk_set_brightness, rest_command.kiosk_screen_off):
#    - Controls the physical backlight via DDC/CI (ddcutil setvcp 10)
#    - Reduces actual power consumption when dimmed or off
#    - Works on Waveshare 10.1DP-CAPLCD and any DDC/CI-capable HDMI display
#    - /screen/off cuts the backlight entirely (~750mA -> ~50mA power saving)
#
#  Best practice — use BOTH together:
#    1. browser_mod overlay for instant visual response (no DDC/CI delay)
#    2. Display API for actual power reduction after the overlay is applied
#    See the "Software blackout" and "Adaptive night dimming" automations above.
#
# =============================================================================
