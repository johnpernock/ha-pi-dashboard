#    action:
#      - service: rest_command.kiosk_set_brightness
#        data:
#          brightness: "{{ states('input_number.kiosk_brightness_slider') | int }}"


# =============================================================================
#  SWITCH — screen on/off (use in automations or as a dashboard toggle)
# =============================================================================
switch:

  - platform: template
    switches:
      kiosk_screen:
        friendly_name: "Kiosk Screen"
        unique_id: kiosk_screen_switch
        icon_template: >
          {% if is_state('switch.kiosk_screen', 'on') %}
            mdi:monitor
          {% else %}
            mdi:monitor-off
          {% endif %}
        # HA has no reliable way to know if the screen is on/off without a
        # dedicated sensor, so this switch tracks its own state optimistically.
        value_template: "{{ is_state('switch.kiosk_screen', 'on') }}"
        turn_on:
          service: rest_command.kiosk_screen_on
        turn_off:
          service: rest_command.kiosk_screen_off


# =============================================================================
#  LIGHT ENTITY — combines brightness + on/off into a single HA light entity
#  This lets you control the kiosk display just like a smart bulb, including
#  from the default HA dashboard, Google Home, Alexa, etc.
# =============================================================================
# =============================================================================
#  TEMPLATE LIGHT — combines hardware brightness + on/off as a single HA light
#  Works with Google Home, Alexa, and any HA dashboard brightness card.
#  Add to configuration.yaml under the 'template:' key (HA 2023.4+)
# =============================================================================
template:
  - light:
      - name: "Kiosk Display"
        unique_id: kiosk_display_light
        state: >
          {{ states('sensor.kiosk_brightness') | int(0) > 0 }}
        brightness: >
          {{ ((states('sensor.kiosk_brightness') | float(50)) / 100 * 255) | int }}
        turn_on:
          - service: rest_command.kiosk_screen_on
          - if:
              - condition: template
                value_template: "{{ brightness is defined }}"
            then:
              - service: rest_command.kiosk_set_brightness
                data:
                  brightness: "{{ (brightness / 255 * 100) | int }}"
            else:
              - service: rest_command.kiosk_set_brightness
                data:
                  brightness: 100
        turn_off:
          - service: rest_command.kiosk_screen_off
        set_level:
          - service: rest_command.kiosk_set_brightness
            data:
              brightness: "{{ (brightness / 255 * 100) | int }}"


# =============================================================================
#  AUTOMATIONS — example day/night brightness schedule
#  Add these to your automations.yaml or paste into the HA automation editor.
# =============================================================================
automation:

  # Dim the display at night (10 PM)
  - alias: "Kiosk — Dim at night"
    id: kiosk_dim_night
    trigger:
      - platform: time
        at: "22:00:00"
    action:
      - service: rest_command.kiosk_set_brightness
        data:
          brightness: 20

  # Restore brightness in the morning (7 AM)
  - alias: "Kiosk — Bright in morning"
    id: kiosk_bright_morning
    trigger:
      - platform: time
        at: "07:00:00"
    action:
      - service: rest_command.kiosk_set_brightness
        data:
          brightness: 100

  # Turn screen off when nobody is home
  - alias: "Kiosk — Screen off when away"
    id: kiosk_screen_away
    trigger:
      - platform: state
        entity_id: group.all_people   # replace with your presence group/person
        to: "not_home"
        for: "00:05:00"
    action:
      - service: rest_command.kiosk_screen_off

  # Turn screen back on when someone arrives
  - alias: "Kiosk — Screen on when home"
    id: kiosk_screen_home
    trigger:
      - platform: state
        entity_id: group.all_people   # replace with your presence group/person
        to: "home"
    action:
      - service: rest_command.kiosk_screen_on
      - service: rest_command.kiosk_set_brightness
        data:
          brightness: 100

  # Reduce brightness when sun sets (adaptive lighting alternative)
  - alias: "Kiosk — Reduce brightness at sunset"
    id: kiosk_sunset_dim
    trigger:
      - platform: sun
        event: sunset
        offset: "+00:30:00"
    action:
      - service: rest_command.kiosk_set_brightness
        data:
          brightness: 40


