# =============================================================================
#  ha-display-config.yaml
#  Home Assistant configuration snippets for kiosk display control.
#
#  Replace KIOSK_IP with your Pi's IP address (e.g. 192.168.1.50).
#  Replace KIOSK_PORT with your API port (default: 2701).
#
#  Paste each section into the matching section of your configuration.yaml,
#  then restart HA (Developer Tools → Check Configuration → Restart).
# =============================================================================


# =============================================================================
#  REST COMMANDS — call these from automations, scripts, or the UI
# =============================================================================
rest_command:

  # Set brightness (0-100)
  kiosk_set_brightness:
    url: "http://KIOSK_IP:KIOSK_PORT/brightness"
    method: POST
    content_type: "application/json"
    payload: '{"value": {{ brightness }}}'

  # Turn display off (Pi stays running — just kills the backlight)
  kiosk_screen_off:
    url: "http://KIOSK_IP:KIOSK_PORT/screen/off"
    method: POST

  # Turn display back on
  kiosk_screen_on:
    url: "http://KIOSK_IP:KIOSK_PORT/screen/on"
    method: POST


# =============================================================================
#  SENSORS — read current brightness and display status
# =============================================================================
sensor:

  - platform: rest
    name: Kiosk Brightness
    unique_id: kiosk_brightness_sensor
    resource: "http://KIOSK_IP:KIOSK_PORT/brightness"
    value_template: "{{ value_json.brightness }}"
    unit_of_measurement: "%"
    device_class: illuminance
    scan_interval: 30   # seconds between polls

  - platform: rest
    name: Kiosk Display Status
    unique_id: kiosk_display_status
    resource: "http://KIOSK_IP:KIOSK_PORT/status"
    value_template: "{{ value_json.backend }}"
    json_attributes:
      - brightness
      - compositor
      - output
    scan_interval: 60

  - platform: rest
    name: Kiosk API Health
    unique_id: kiosk_api_health
    resource: "http://KIOSK_IP:KIOSK_PORT/health"
    value_template: "{{ value_json.status }}"
    scan_interval: 60


# =============================================================================
#  INPUT NUMBER — brightness slider (0-100, step 5)
#  Add to configuration.yaml. An automation (below) applies changes to hardware.
#  This pattern is compatible with all current HA versions.
# =============================================================================
input_number:
  kiosk_brightness_slider:
    name: "Kiosk Brightness"
    initial: 100
    min: 0
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:brightness-6

# =============================================================================
#  AUTOMATION — apply input_number changes to the display API
#  Add to automations.yaml
# =============================================================================
